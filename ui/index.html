<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Realtime Audio Server — UI</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Realtime Audio Server</h1>
      <div class="badges">
        <span class="badge" id="ws-status">disconnected</span>
        <span class="badge" id="server-fps">srv 0 Hz</span>
        <span class="badge" id="ui-fps">ui 0 fps</span>
      </div>
    </header>

    <main class="grid" id="main-grid">
      <section class="viz-grid">
        <div class="viz-card" data-card="bars">
          <div class="viz-title">L/M/H bars + peak hold <label class="inline" title="**Peak-hold decay rate** (units / sec).

Affects the white peak ticks on this graph **and** on the FFT graph.

- Smaller → peaks linger longer
- Larger → peaks fall faster

*Visual only — does not affect DSP or OSC payload.*"><input type="range" id="peak-decay" min="10" max="100" step="1" style="width:80px;vertical-align:middle" /> <span id="peak-decay-val" style="font-size:11px"></span></label></div>
          <canvas id="viz-bars" width="320" height="200"></canvas>
        </div>
        <div class="viz-card" data-card="lines">
          <div class="viz-title">L/M/H rolling lines <label class="inline" title="**Rolling history window** (seconds).

How far back the rolling chart extends. Larger values pack more time into the same canvas width.

*Visual only.*"><input type="range" id="history-s" min="2" max="30" step="0.001" data-log="1" style="width:80px;vertical-align:middle" /> <span id="history-s-val" style="font-size:11px"></span></label></div>
          <canvas id="viz-lines" width="640" height="200"></canvas>
        </div>
        <div class="viz-card" data-card="scene">
          <div class="viz-title">L/M/H scene</div>
          <canvas id="viz-scene" width="640" height="200"></canvas>
        </div>
        <div class="viz-card" data-card="fft">
          <div class="viz-title">FFT (log-x, dB) <label class="inline" title="**Enable / disable the FFT worker.**

Disabling saves CPU when you only need L/M/H."><input type="checkbox" id="fft-toggle" /> enable</label> <label class="inline" title="**What you see is what's sent.** This graph is byte-identical to the `/audio/fft` OSC payload.

- **OFF** (default): server runs the same per-bin pipeline as L/M/H (smoother → asymmetric peak follower → soft gate → tanh → strength blend) and sends `[0..1]` post-processed values.
- **ON**: server sends the raw wire-dB log spectrum (sentinels rendered as gaps).

The server is authoritative — toggling sends `set_fft_send_raw_db`; the OSC payload switches in lockstep with the visualization."><input type="checkbox" id="fft-raw-db" /> raw dB</label></div>
          <canvas id="viz-fft" width="640" height="200"></canvas>
        </div>
      </section>

      <div class="grid-resizer" id="grid-resizer" title="Drag to resize the side panel"></div>

      <aside class="controls">
        <fieldset>
          <legend>Input device</legend>
          <select id="device-select"></select>
          <button id="device-refresh" title="**Re-enumerate input devices** via PortAudio.

Cheap and instant. Use after plugging / unplugging a device.">refresh</button>
          <button id="device-probe" title="**Re-enumerate AND probe** every input briefly (~200 ms each) to detect which ones are currently producing signal.

Devices that saw audio during the probe get a ★.

*Slower than refresh, and momentarily grabs each device — use sparingly.*">probe</button>
        </fieldset>

        <fieldset id="fieldset-bandpass">
          <legend>Bandpass edges</legend>
          <div id="freq-axis" title="**Bandpass edges.**

- Click a colored band to **select** it.
- Drag its **body** to shift the whole band.
- Drag a **left / right handle** to move just that edge.
- Click outside any band to deselect.

Bands may overlap."></div>
        </fieldset>

        <fieldset>
          <legend>Auto-scaler</legend>
          <label title="**Master gain.** Final output gain applied to L/M/H and processed FFT after the full post-processing pipeline.

Multiplies whatever is sent over OSC and WebSocket.

- Range: `0.5–1.5` (centered at `1.0`)
- Values `> 1.0` push outputs above 1.0 — downstream consumers must accept this

*UI visualizers cosmetically clamp at 1.0 for rendering, but the OSC / WS payload is unclamped. Track and dot tint orange / red as the gain rises past 1.0 to flag the overflow visually.*">master gain <input type="range" id="autoscale-master" min="50" max="150" step="1" /> <span id="autoscale-master-val"></span></label>
          <label title="**Strength.** Blend between auto-scaled and raw output.

- `100%` → full per-bin / per-band peak normalization
- `0%` → honest dB readout for the FFT, raw RMS for L/M/H

Drives both the L/M/H output and the FFT visualizer.">strength <input type="range" id="autoscale-strength" min="0" max="100" step="1" /> <span id="autoscale-strength-val"></span></label>
          <label title="**Soft noise gate.** Signals below this RMS are treated as silence — the auto-scaler won't try to amplify them.

- Shown in `dBFS`
- Applied to both L/M/H and FFT bins

Bins below the floor stay pinned at the chart bottom (no disappearing bars).">noise gate <input type="range" id="autoscale-floor" min="0" max="1000" step="1" /> <span id="autoscale-floor-val"></span></label>
          <label title="**Spectral tilt** that rebalances the noise gate across frequency: `+N dB / oct` above 1 kHz, `−N dB / oct` below.

- **FFT side**: shifts the wire dB before the gate / peak follower.
- **L/M/H side**: derives a per-band noise floor from each band's geometric center — so the same global gate fires uniformly across frequency on both pipelines.

Typical values:

- `0` → flat (honest dB / single global gate)
- `~3` → pink-noise compensation (typical music feels balanced)
- higher → more high-end through the gate">tilt (dB/oct) <input type="range" id="fft-tilt" min="-25" max="50" step="1" /> <span id="fft-tilt-val"></span></label>
        </fieldset>

        <fieldset>
          <legend>Peak follower</legend>
          <label title="**Attack time** of the asymmetric peak follower.

How fast the tracked peak follows a **rising** signal.

- Smaller → snappier transients
- Larger → damped

Drives both the L/M/H auto-scaler and the FFT per-bin peak follower.">attack (ms) <input type="range" id="autoscale-attack" min="1" max="500" step="1" data-log="1" /> <span id="autoscale-attack-val"></span></label>
          <label title="**Release time** of the asymmetric peak follower (the &quot;rolling window&quot;).

How long loud peaks are held before the tracked peak decays.

- Longer → quieter passages stay visible
- Snaps to multiples of `10 s`

Drives both the L/M/H auto-scaler and the FFT per-bin peak follower.">release (s) <input type="range" id="autoscale-tau" min="10" max="300" step="1" data-log="1" /> <span id="autoscale-tau-val"></span></label>
          <label title="**FFT-only.** Spatial smear applied to the per-bin peak follower (Gaussian, in **octaves** of frequency, reflect-padded edges).

- `0` → each bin self-normalizes; single-tone bins over-attenuate themselves and read smaller than their neighbors.
- Higher → peaks are shared with neighboring bins, so a single-frequency spike still reads as taller than its spectral context.

*The L/M/H peak follower has no spectral context, so this knob doesn't affect it.*">smear (oct) <input type="range" id="fft-peak-smear" min="0" max="200" step="1" /> <span id="fft-peak-smear-val"></span></label>
        </fieldset>

        <fieldset>
          <legend>Smoothing tau (ms)</legend>
          <label title="**LOW band smoother time constant.**

- Larger → lazier / smoother
- Smaller → snappier

Also drives FFT-bin smoothing for the visualizer (interpolated across the spectrum from the L/M/H band centers).">low <input type="range" id="tau-low"  min="5" max="2000" step="1" data-log="1" /> <span id="tau-low-val"></span></label>
          <label title="**MID band smoother time constant.**

- Larger → lazier / smoother
- Smaller → snappier

Also drives FFT-bin smoothing for the visualizer (interpolated across the spectrum from the L/M/H band centers).">mid <input type="range" id="tau-mid"  min="5" max="2000" step="1" data-log="1" /> <span id="tau-mid-val"></span></label>
          <label title="**HIGH band smoother time constant.**

- Larger → lazier / smoother
- Smaller → snappier

Also drives FFT-bin smoothing for the visualizer (interpolated across the spectrum from the L/M/H band centers).">high <input type="range" id="tau-high" min="5" max="2000" step="1" data-log="1" /> <span id="tau-high-val"></span></label>
        </fieldset>

        <fieldset>
          <legend>UI refresh rate</legend>
          <label title="**UI refresh rate.** Target frame rate for the browser visualization.

Drives both:

- how often the server pushes L/M/H snapshots and FFT frames over WS
- how often the canvases redraw (throttled to match)

Snaps to standard frame rates: `15 / 24 / 30 / 60 / 90 / 120 fps`, capped at 120.">fps <input type="range" id="ws-hz" min="0" max="5" step="1" /> <span id="ws-hz-val"></span></label>
        </fieldset>

        <fieldset>
          <legend>Presets</legend>
          <div class="row">
            <input type="text" id="preset-name" placeholder="preset name" maxlength="64" />
            <button id="preset-save">save</button>
          </div>
          <div class="row">
            <select id="preset-list"></select>
            <button id="preset-load">load</button>
          </div>
        </fieldset>

        <fieldset>
          <legend title="**Live timing** for each stage of the audio → visualization pipeline.

Each row shows **avg / p95 ms** per tick, plus a load bar (% of that stage's time budget). Bar turns **amber ≥ 50%**, **red ≥ 80%**.

# Server stages
- `cb` — PortAudio callback (per audio block)
- `dsp` — L/M/H IIR + RMS + smoother + auto-scaler
- `fft` — windowed FFT + log-bin + per-bin post-processing
- `ws` — WebSocket broadcast

# Browser stages
- `raf` — inter-draw interval vs target fps
- `lines / bars / scene / fft` — per-canvas paint cost

# Counters

Should all stay `0` in normal operation:

- `cb_overruns` — audio callback overruns (xruns)
- `dsp_drops` / `fft_drops` — blocks the worker couldn't keep up with">Performance</legend>
          <div id="perf-rows"></div>
          <div class="counters">
            <span>cb_overruns: <b id="cb_overruns">0</b></span>
            <span>dsp_drops: <b id="dsp_drops">0</b></span>
            <span>fft_drops: <b id="fft_drops">0</b></span>
          </div>
        </fieldset>

        <fieldset>
          <legend>Errors</legend>
          <div id="err-log" class="err-log"></div>
        </fieldset>
      </aside>

      <button class="controls-collapse-btn" id="controls-collapse" type="button" title="Collapse side panel" aria-label="Collapse side panel">›</button>
      <button class="controls-expand-btn" id="controls-expand" type="button" title="Expand side panel" aria-label="Expand side panel">‹</button>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
