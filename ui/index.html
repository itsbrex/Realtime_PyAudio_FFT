<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Realtime Audio Server — UI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Realtime Audio Server</h1>
      <div class="badges">
        <span class="badge" id="ws-status">disconnected</span>
        <span class="badge" id="server-fps">srv 0 Hz</span>
        <span class="badge" id="ui-fps">ui 0 fps</span>
      </div>
    </header>

    <main class="grid">
      <section class="viz-grid">
        <div class="viz-card">
          <div class="viz-title">L/M/H rolling lines</div>
          <canvas id="viz-lines" width="640" height="200"></canvas>
        </div>
        <div class="viz-card">
          <div class="viz-title">L/M/H bars + peak hold</div>
          <canvas id="viz-bars" width="320" height="200"></canvas>
        </div>
        <div class="viz-card">
          <div class="viz-title">L/M/H scene</div>
          <canvas id="viz-scene" width="640" height="200"></canvas>
        </div>
        <div class="viz-card">
          <div class="viz-title">FFT (log-x, dB) <label class="inline" title="Enable / disable the FFT worker. Disabling saves CPU when you only need L/M/H."><input type="checkbox" id="fft-toggle" /> enable</label></div>
          <canvas id="viz-fft" width="640" height="200"></canvas>
        </div>
      </section>

      <aside class="controls">
        <fieldset>
          <legend>Input device</legend>
          <select id="device-select"></select>
          <button id="device-refresh">refresh</button>
          <button id="device-probe">probe</button>
        </fieldset>

        <fieldset>
          <legend>Bandpass edges</legend>
          <div id="freq-axis" title="Drag a colored region to shift it; drag its left/right handle to move just that edge. Bands may overlap."></div>
          <label title="LOW bandpass — bottom edge. Set above the noise/rumble floor (e.g. 30 Hz) to keep DC and sub-bass rumble out of the LOW output.">low.lo <input type="range" id="low-lo"  min="20"   max="500"   step="1" data-log="1" /> <span id="low-lo-val"></span></label>
          <label title="LOW bandpass — top edge. Boundary above which LOW energy rolls off.">low.hi <input type="range" id="low-hi"  min="50"   max="2000"  step="1" data-log="1" /> <span id="low-hi-val"></span></label>
          <label title="MID bandpass — bottom edge.">mid.lo <input type="range" id="mid-lo"  min="100"  max="4000"  step="1" data-log="1" /> <span id="mid-lo-val"></span></label>
          <label title="MID bandpass — top edge.">mid.hi <input type="range" id="mid-hi"  min="500"  max="8000"  step="1" data-log="1" /> <span id="mid-hi-val"></span></label>
          <label title="HIGH bandpass — bottom edge.">high.lo <input type="range" id="high-lo" min="1000" max="12000" step="1" data-log="1" /> <span id="high-lo-val"></span></label>
          <label title="HIGH bandpass — top edge. Cap the air/sibilance region; many consumer mics roll off above ~16 kHz.">high.hi <input type="range" id="high-hi" min="2000" max="22000" step="1" data-log="1" /> <span id="high-hi-val"></span></label>
        </fieldset>

        <fieldset>
          <legend>Smoothing tau (ms)</legend>
          <label title="Time constant of the LOW band's exponential smoother. Larger = lazier / smoother response, smaller = snappier / more reactive.">low <input type="range" id="tau-low"  min="5" max="2000" step="1" data-log="1" /> <span id="tau-low-val"></span></label>
          <label title="Time constant of the MID band's exponential smoother. Larger = lazier, smaller = snappier.">mid <input type="range" id="tau-mid"  min="5" max="2000" step="1" data-log="1" /> <span id="tau-mid-val"></span></label>
          <label title="Time constant of the HIGH band's exponential smoother. Larger = lazier, smaller = snappier.">high <input type="range" id="tau-high" min="5" max="2000" step="1" data-log="1" /> <span id="tau-high-val"></span></label>
        </fieldset>

        <fieldset>
          <legend>Auto-scaler</legend>
          <label title="Release time of the rolling peak follower. Longer windows hold loud peaks longer, so quieter passages stay visible. Snaps to multiples of 10 s.">window (s) <input type="range" id="autoscale-tau" min="10" max="300" step="1" data-log="1" /> <span id="autoscale-tau-val"></span></label>
          <label title="Soft noise gate: signals below this RMS are treated as silence (the auto-scaler won't try to amplify them). Shown in dBFS.">noise gate <input type="range" id="autoscale-floor" min="0" max="1000" step="1" /> <span id="autoscale-floor-val"></span></label>
          <label title="Blend between auto-scaled (1.0) and raw (0.0) output. 100% lets the auto-scaler fully normalize per-band; 0% disables it.">strength <input type="range" id="autoscale-strength" min="0" max="100" step="1" /> <span id="autoscale-strength-val"></span></label>
          <div class="raw-strip" title="Raw per-band RMS (pre auto-scaler). Useful to see how 'hot' the input is and to set the noise gate.">
            raw:
            <span class="raw-bar"><span class="raw-bar-fill" id="raw-low"></span></span>
            <span class="raw-bar"><span class="raw-bar-fill" id="raw-mid"></span></span>
            <span class="raw-bar"><span class="raw-bar-fill" id="raw-high"></span></span>
          </div>
        </fieldset>

        <fieldset>
          <legend>WS snapshot rate</legend>
          <label title="How often the server pushes L/M/H snapshots and FFT frames to the browser. Higher = smoother visuals, more bandwidth.">hz <input type="range" id="ws-hz" min="15" max="240" step="1" data-log="1" /> <span id="ws-hz-val"></span></label>
        </fieldset>

        <fieldset>
          <legend>Presets</legend>
          <div class="row">
            <input type="text" id="preset-name" placeholder="preset name" maxlength="64" />
            <button id="preset-save">save</button>
          </div>
          <div class="row">
            <select id="preset-list"></select>
            <button id="preset-load">load</button>
          </div>
        </fieldset>

        <fieldset>
          <legend>Performance</legend>
          <div id="perf-rows"></div>
          <div class="counters">
            <span>cb_overruns: <b id="cb_overruns">0</b></span>
            <span>dsp_drops: <b id="dsp_drops">0</b></span>
            <span>fft_drops: <b id="fft_drops">0</b></span>
          </div>
        </fieldset>

        <fieldset>
          <legend>Errors</legend>
          <div id="err-log" class="err-log"></div>
        </fieldset>
      </aside>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
